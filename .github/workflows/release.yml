name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows MSVC release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: x86_64-pc-windows-msvc

      - name: Verify tag matches Cargo version
        shell: pwsh
        run: |
          $cargoVersion = (cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages[0].version
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          if ($cargoVersion -ne $tagVersion) {
            throw "Tag version $tagVersion does not match Cargo.toml version $cargoVersion"
          }

      - name: Test
        run: cargo test --locked --all-targets

      - name: Build
        run: cargo build --locked --release --target x86_64-pc-windows-msvc

      - name: Package and checksum
        shell: pwsh
        run: |
          $asset = "oxidra-x86_64-pc-windows-msvc.zip"
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/oxidra.exe dist/oxidra.exe
          Compress-Archive -LiteralPath dist/oxidra.exe -DestinationPath "dist/$asset"
          $hash = (Get-FileHash -LiteralPath "dist/$asset" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $asset" | Set-Content -LiteralPath "dist/$asset.sha256" -Encoding ascii -NoNewline

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/oxidra-x86_64-pc-windows-msvc.zip
            dist/oxidra-x86_64-pc-windows-msvc.zip.sha256
